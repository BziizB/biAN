name: Paper Trading Pages

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/paper-trading-pages.yml"
      - "paper_update.py"
      - "monitor_frontend/**"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: paper-trading-pages
  cancel-in-progress: false

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Run paper trading update
        run: python paper_update.py

      - name: Commit paper trading data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add paper_trading
          if git diff --cached --quiet; then
            echo "No paper trading changes to commit."
          else
            git commit -m "Update paper trading data"
            git push
          fi

      - name: Build static Pages artifact
        run: |
          rm -rf gh-pages-site
          mkdir -p gh-pages-site
          cp -r monitor_frontend/. gh-pages-site/
          cp -r paper_trading gh-pages-site/paper_trading
          touch gh-pages-site/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: gh-pages-site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
